name: haze

services:
  storage-init:
    image: alpine:3.20
    restart: "no"
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /storage && chown -R ${PUID:-1000}:${PGID:-1000} /storage"]
    volumes:
      - type: bind
        source: ${HAZE_STORAGE_PATH:-./data/storage}
        target: /storage

  registry:
    image: registry:2.8
    restart: unless-stopped
    environment:
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    ports:
      - "5000:5000"
    volumes:
      - type: bind
        source: ${HAZE_REGISTRY_PATH:-./data/registry}
        target: /var/lib/registry

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: haze-backend:${HAZE_VERSION:-latest}
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: "mysql+pymysql://admin:Power1602!@host.docker.internal:3306/Haze?charset=utf8mb4"
      JWT_SECRET_KEY: "SxxPkeg-XZgee7V0RA3Hh5VkJwzqh3bzyqEyWu4KDII"
      INITIAL_ADMIN_NAME: "admin"
      INITIAL_ADMIN_PHONE: "18158183710"
      INITIAL_ADMIN_EMAIL: "zoop6454@gmail.com"
      INITIAL_ADMIN_PASSWORD: "power1602"
      INITIAL_ADMIN_DEPARTMENT: "系统"
      CORS_ORIGINS: '["https://skill.paiwo188.com"]'
      LOCAL_STORAGE_DIR: /app/storage
      DOWNLOAD_PUBLIC_BASE_URL: "https://skill.paiwo188.com"
      GATEWAY_PUBLIC_BASE_URL: "https://mcp.skill.paiwo188.com"
      MCP_DOCKER_PREPULL: "false"
      WEB_CONCURRENCY: "2"
    volumes:
      - type: bind
        source: ${HAZE_STORAGE_PATH:-./data/storage}
        target: /app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    image: haze-backend:${HAZE_VERSION:-latest}
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    command: ["python", "-m", "gateway.main"]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "mysql+pymysql://admin:Power1602!@host.docker.internal:3306/Haze?charset=utf8mb4"
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GATEWAY_PORT:-8001}:8001"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    image: haze-backend:${HAZE_VERSION:-latest}
    restart: unless-stopped
    user: "0:0"
    command: ["python", "-m", "worker.main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "mysql+pymysql://admin:Power1602!@host.docker.internal:3306/Haze?charset=utf8mb4"
      LOCAL_STORAGE_DIR: /app/storage
      K8S_IN_CLUSTER: "false"
      K8S_CONFIG_PATH: /run/haze/kubeconfig
      K8S_NAMESPACE: "haze-runtime"
      K8S_PROXY_BASE_URL: "http://host.docker.internal:8090"
      GATEWAY_PUBLIC_BASE_URL: "https://mcp.skill.paiwo188.com"
      REGISTRY_URL: "192.168.40.132:5000"
      REGISTRY_PROJECT: "haze-mcp"
      REGISTRY_PUSH_ENABLED: "true"
      DOCKER_CONFIG: /root/.docker
      BUILDX_CONFIG: /tmp/buildx
    volumes:
      - type: bind
        source: ${HAZE_STORAGE_PATH:-./data/storage}
        target: /app/storage
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /home/paiwo/.kube/config
        target: /run/haze/kubeconfig
        read_only: true
      - type: bind
        source: ${DOCKER_CONFIG_PATH:-/root/.docker}
        target: /root/.docker
        read_only: true
    depends_on:
      backend:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
      registry:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: haze-frontend:${HAZE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
